<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            background:#fff;
            width:100%;
            max-width:900px;
            display:flex;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .left{
            width:40%;
            background:#0d6efd;
            color:#fff;
            padding:40px 30px;
        }

        .left h2{
            margin-bottom:20px;
            font-size:32px;
        }

        .left p{
            margin-bottom:30px;
            line-height:1.6;
        }

        .info{
            margin-bottom:20px;
            font-size:18px;
        }

        .right{
            width:60%;
            padding:40px;
        }

        .right h2{
            color:#333;
            margin-bottom:20px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            transition:.3s;
        }

        input:focus,
        textarea:focus{
            border-color:#0d6efd;
            outline:none;
            box-shadow:0 0 8px rgba(13,110,253,.3);
        }

        textarea{
            resize:none;
            height:140px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:15px;
            border-radius:30px;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#084298;
            transform:translateY(-2px);
        }

        @media(max-width:768px){

            .container{
                flex-direction:column;
            }

            .left,
            .right{
                width:100%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <h2>Contact Us</h2>

        <p>
            We'd love to hear from you. Feel free to send us your questions,
            suggestions, or feedback using the contact form.
        </p>

        <div class="info">
            📍 Mumbai, Maharashtra, India
        </div>

        <div class="info">
            📞 +91 98765 43210
        </div>

        <div class="info">
            ✉ contact@example.com
        </div>
    </div>

    <div class="right">

        <h2>Send us a Message</h2>

        <form action="#" method="post">

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="text" placeholder="Subject">

            <textarea placeholder="Write your message here..." required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</div>

</body>
</html>
